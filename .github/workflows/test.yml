name: Mothbox Tests

on:
  push:
    branches: [ main, dev, 'feature/**' ]
    paths:
      # Python source code
      - '**.py'
      - 'Firmware/mothbox_paths.py'
      - 'Firmware/webui/backend/**'
      - 'Firmware/4.x/**/*.py'
      - 'Firmware/5.x/**/*.py'
      - 'Firmware/installation-utils/**'
      # Test files
      - 'Firmware/Tests/**'
      # Configuration files
      - 'Firmware/**/requirements*.txt'
      - 'Firmware/pyproject.toml'
      - 'Firmware/pytest.ini'
      # CI/CD workflows
      - '.github/workflows/test.yml'
      # Installer scripts
      - 'Firmware/install_mothbox.sh'
      - 'Firmware/update_mothbox.sh'
      - 'Firmware/uninstall_mothbox.sh'
      # Frontend files
      - 'Firmware/webui/frontend/**'

  pull_request:
    branches: [ main, dev ]
    paths:
      - '**.py'
      - 'Firmware/Tests/**'
      - 'Firmware/**/requirements*.txt'
      - 'Firmware/webui/frontend/**'
      - '.github/workflows/test.yml'

  workflow_dispatch:

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Firmware

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            Firmware/Tests/requirements-test.txt
            Firmware/webui/backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcap-dev python3-dev libatlas-base-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Tests/requirements-test.txt

      - name: Run unit tests with coverage
        run: |
          pytest Tests/unit/ \
            --cov=mothbox_paths \
            --cov=webui/backend \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=html \
            -v \
            --tb=short

      - name: Run integration tests (non-hardware)
        run: |
          pytest Tests/integration/ \
            -v \
            -m "not hardware" \
            --tb=short

      - name: Check coverage threshold (85%)
        run: |
          pip install coverage
          coverage report --fail-under=85

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-python-${{ matrix.python-version }}
          path: Firmware/htmlcov/
          retention-days: 7

      - name: Upload coverage XML (for badges)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-python-${{ matrix.python-version }}
          path: Firmware/coverage.xml
          retention-days: 7

  frontend-tests:
    name: Frontend Tests (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Firmware/webui/frontend

    strategy:
      fail-fast: false
      matrix:
        node-version: ['20']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: Firmware/webui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-node-${{ matrix.node-version }}
          path: Firmware/webui/frontend/coverage/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Backend tests: ${{ needs.backend-tests.result }}"
          echo "Frontend tests: ${{ needs.frontend-tests.result }}"

          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "❌ Backend tests failed"
            exit 1
          fi

          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "❌ Frontend tests failed"
            exit 1
          fi

          echo "✅ All tests passed successfully!"
