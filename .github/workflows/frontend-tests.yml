name: Frontend Tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'Firmware/webui/frontend/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'Firmware/webui/frontend/**'
      - '.github/workflows/frontend-tests.yml'

defaults:
  run:
    working-directory: Firmware/webui/frontend

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Firmware/webui/frontend/package-lock.json

      - run: npm ci

      - name: Run tests (shard ${{ matrix.shard }}/4)
        run: npx vitest run --shard=${{ matrix.shard }}/4 --reporter=verbose

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Firmware/webui/frontend/package-lock.json

      - run: npm ci

      - name: Run coverage
        run: npx vitest run --coverage --reporter=verbose

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: Firmware/webui/frontend/coverage/
          retention-days: 14
