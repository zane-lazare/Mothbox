name: Frontend Tests

on:
  pull_request:
    paths:
      - 'Firmware/webui/frontend/**'
  push:
    branches: [main, dev]
    paths:
      - 'Firmware/webui/frontend/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Firmware/webui/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: Firmware/webui/frontend
        run: npm ci

      - name: Run ESLint
        working-directory: Firmware/webui/frontend
        run: npm run lint

  test:
    name: Test (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Firmware/webui/frontend/package-lock.json'

      - name: Install dependencies
        working-directory: Firmware/webui/frontend
        run: npm ci

      - name: Run tests (shard ${{ matrix.shard }}/4)
        working-directory: Firmware/webui/frontend
        run: npm run test:run -- --shard=${{ matrix.shard }}/4 --reporter=verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: Firmware/webui/frontend/test-results/
          if-no-files-found: ignore

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "Tests failed"
            exit 1
          fi
          echo "All test shards passed"
