# Mothbox Firmware - pytest and coverage configuration
# Created for Issue #13 Phase 3: CI/CD Integration

[tool.pytest.ini_options]
testpaths = ["Tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Additional pytest options
addopts = [
    "-ra",                    # Show summary of all test outcomes
    "--strict-markers",       # Raise error on unregistered markers
    "--strict-config",        # Raise error on config issues
    "--showlocals",          # Show local variables in tracebacks
]

# Test markers (defined in Tests/conftest.py)
markers = [
    "hardware: tests requiring Raspberry Pi hardware (camera, GPIO, sensors)",
    "photo: tests using photo workflow (TakePhoto.py subprocess)",
    "stream: tests using stream workflow (CameraStreamer instance)",
    "both: tests using both photo and stream workflows",
    "websocket: tests using WebSocket/SocketIO layer",
    "performance: performance and benchmark tests",
    "integration: multi-component integration tests",
    "calibration: calibration functionality tests",
    "unit: unit tests for individual functions and modules",
    "xdist_group(name): Group tests to run on same worker (pytest-xdist)",
]

[tool.coverage.run]
# Source directories to measure coverage
source = [".", "webui/backend"]

# Enable parallel coverage collection for pytest-xdist
parallel = true
concurrency = ["multiprocessing", "thread"]

# Enable branch coverage (more thorough than line coverage)
branch = true

# Files and directories to omit from coverage
omit = [
    # Test files
    "*/tests/*",
    "*/Tests/*",

    # Python cache and build
    "*/__pycache__/*",
    "*/site-packages/*",
    "*/venv/*",
    "*/.venv/*",

    # External libraries bundled with firmware
    "*/4.x/scripts/RaspberryPi_JetsonNano_Epaper/*",
    "*/5.x/scripts/RaspberryPi_JetsonNano_Epaper/*",

    # Frontend code (tested separately with vitest)
    "*/webui/frontend/*",

    # Scripts that are run manually (not imported)
    "*/installation-utils/scripts/*",
]

[tool.coverage.paths]
# Map source paths for combining coverage from different CI jobs
source = [
    ".",
    "/home/runner/work/Mothbox/Mothbox/Firmware/",
]

[tool.coverage.report]
# Decimal precision for coverage percentages
precision = 2

# Show lines that are missing coverage
show_missing = true

# Don't skip files with 100% coverage
skip_covered = false

# Lines to exclude from coverage measurement
exclude_lines = [
    # Standard pragmas
    "pragma: no cover",

    # Defensive programming
    "raise AssertionError",
    "raise NotImplementedError",

    # Type checking
    "if TYPE_CHECKING:",
    "if not TYPE_CHECKING:",

    # Debugging
    "def __repr__",

    # Platform-specific code
    "if sys.platform",

    # Main block
    "if __name__ == .__main__.:",

    # Abstract methods
    "@(abc\\.)?abstractmethod",
    "@overload",
]

[tool.coverage.html]
# Output directory for HTML coverage reports
directory = "htmlcov"

[tool.coverage.xml]
# Output file for XML coverage reports (for CI/CD)
output = "coverage.xml"

[tool.bandit]
# Bandit security scanner configuration
# Issue #79: Add Security Scanning and Enhanced Linting to CI/CD
# Documentation: https://bandit.readthedocs.io/

# Directories to exclude from security scanning
exclude_dirs = [
    # Test files - allowed to use subprocess, mocking, etc.
    "Tests/",
    "*/Tests/*",

    # Python cache and build artifacts
    "*/__pycache__/*",
    "*/venv/*",
    "*/.venv/*",
    "*/node_modules/*",
    ".pytest_cache/",
    "htmlcov/",
    "build/",
    "dist/",

    # External vendor libraries bundled with firmware
    "*/4.x/scripts/RaspberryPi_JetsonNano_Epaper/*",
    "*/5.x/scripts/RaspberryPi_JetsonNano_Epaper/*",

    # Deprecated scripts (not in production use)
    "*/4.x/scripts/OldScripts/*",
    "*/5.x/scripts/OldScripts/*",

    # Frontend code (JavaScript/React - scanned separately with ESLint)
    "webui/frontend/",

    # Version control
    ".git/",
]

# Severity policy (enforced in CI/CD):
# - HIGH/MEDIUM: CI fails - requires immediate fix
# - LOW/INFO: Warning only - address during refactoring
# Note: This is stricter than Issue #79's suggested HIGH-only policy

# Test skips: None configured - use inline # nosec comments with justifications
# Example: # nosec B603 - Hardcoded systemctl command, no user input

[tool.ruff]
# Ruff configuration for Python linting and formatting
# Issue #79: Add Security Scanning and Enhanced Linting to CI/CD
# Documentation: https://docs.astral.sh/ruff/

# Target Python 3.13 (matches CI/CD test matrix)
target-version = "py313"

# Same exclusions as Bandit and Coverage for consistency
exclude = [
    # Test files
    "Tests/",

    # Python cache and build artifacts
    "__pycache__",
    ".venv",
    "venv",
    ".pytest_cache",
    "htmlcov",
    "build",
    "dist",
    "*.egg-info",

    # Firmware helper/utility scripts (not yet cleaned up)
    # TakePhoto.py is linted (cleaned in #390); other scripts excluded until cleaned
    "4.x/scripts/",
    "5.x/scripts/",
    "4.x/Attract_Off.py",
    "4.x/Attract_On.py",
    "4.x/Backup_Files.py",
    "4.x/DebugMode.py",
    "4.x/Measure_Power.py",
    "4.x/Scheduler.py",
    "4.x/TurnEverythingOff.py",
    "4.x/UpdateDisplay.py",
    "5.x/Backup_Files.py",
    "5.x/Measure_Power.py",
    "5.x/PCA9536.py",
    "5.x/Test_light_sensor.py",
    "5.x/Testina.py",
    "5.x/TurnEverythingOff.py",
    "5.x/UpdateDisplay.py",
    "5.x/testPCA.py",
    "5.x/testmuxi2c.py",

    # Frontend code (JavaScript/React - linted with ESLint)
    "webui/frontend/",

    # Version control
    ".git/",
]

# Line length (default is 88, using 100 for flexibility)
line-length = 100

[tool.ruff.lint]
# Enable recommended rule sets plus additional useful checks
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes (undefined names, unused imports, etc.)
    "I",      # isort (import sorting)
    "N",      # pep8-naming conventions
    "UP",     # pyupgrade (modern Python syntax)
    "B",      # flake8-bugbear (common bugs and design problems)
    "C4",     # flake8-comprehensions (better list/dict/set comprehensions)
    "SIM",    # flake8-simplify (simplification suggestions)
    "PIE",    # flake8-pie (misc. lints)
]

# Ignore specific rules that conflict with project needs
ignore = [
    "E501",   # Line too long (handled by formatter, not enforced strictly)
    "B008",   # Do not perform function calls in argument defaults (common in Flask)
]

[tool.ruff.lint.per-file-ignores]
# Allow subprocess and shell-related rules in hardware control scripts
# These are legitimate uses for Raspberry Pi GPIO/camera/system control
"4.x/*.py" = ["S603", "S607"]
"5.x/*.py" = ["S603", "S607"]
"webui/backend/*.py" = ["S603", "S607"]
"installation-utils/*.py" = ["S603", "S607"]

# E402: sys.path manipulation before imports is required in these files
# to resolve mothbox_paths and other local modules at runtime.
# New files should NOT be added here — structure imports to avoid sys.path at module level.
"webui/backend/app.py" = ["E402"]
"webui/backend/lib/gps_exif_lib.py" = ["E402"]
"webui/backend/utils/__init__.py" = ["E402"]
"webui/backend/scripts/run_photo_calibration.py" = ["E402"]
"webui/cli/gps_exif_tagger.py" = ["E402"]
"webui/cli/batch_tag_photos.py" = ["E402"]
"webui/cli/verify_gps_exif.py" = ["E402"]
"check_and_run.py" = ["E402"]

[tool.ruff.format]
# Use Black-compatible formatting for consistency with Python community standards
quote-style = "double"
indent-style = "space"
line-ending = "auto"

# Format docstrings
docstring-code-format = true
