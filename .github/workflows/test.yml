name: Mothbox Tests

on:
  push:
    branches: [ main, dev, 'feature/**' ]
    paths:
      # Python source code
      - '**.py'
      - 'Firmware/mothbox_paths.py'
      - 'Firmware/webui/backend/**'
      - 'Firmware/4.x/**/*.py'
      - 'Firmware/5.x/**/*.py'
      - 'Firmware/installation-utils/**'
      # Test files
      - 'Firmware/Tests/**'
      # Configuration files
      - 'Firmware/**/requirements*.txt'
      - 'Firmware/pyproject.toml'
      - 'Firmware/pytest.ini'
      # CI/CD workflows
      - '.github/workflows/test.yml'
      # Installer scripts
      - 'Firmware/install_mothbox.sh'
      - 'Firmware/update_mothbox.sh'
      - 'Firmware/uninstall_mothbox.sh'
      # Frontend files
      - 'Firmware/webui/frontend/**'

  pull_request:
    branches: [ main, dev ]
    paths:
      - '**.py'
      - 'Firmware/Tests/**'
      - 'Firmware/**/requirements*.txt'
      - 'Firmware/webui/frontend/**'
      - '.github/workflows/test.yml'

  workflow_dispatch:

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Limit permissions of GITHUB_TOKEN for security
permissions:
  contents: read
  actions: read

jobs:
  # ==========================================================================
  # Unit Tests - Split into 3 parallel shards for faster execution
  # ==========================================================================
  backend-unit-tests:
    name: Unit Tests (Shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Firmware

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            Firmware/Tests/requirements-test.txt
            Firmware/webui/backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcap-dev python3-dev libatlas-base-dev libjpeg-dev zlib1g-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Tests/requirements-test.txt
          # Install additional backend dependencies needed for test imports
          pip install python-crontab timezonefinder==6.5.4 croniter

      - name: Run unit tests with coverage (shard ${{ matrix.shard }}/3)
        env:
          MOTHBOX_ENV: test
        run: |
          # Note: --cov-fail-under is NOT used with sharding because each shard
          # only runs 1/3 of tests and achieves ~50% coverage individually.
          # Coverage threshold is enforced locally via `pytest --cov-fail-under=85`
          # when running the full test suite (without sharding).
          pytest Tests/unit/ \
            -n auto \
            --cov=. \
            --cov-report=xml:coverage-unit-${{ matrix.shard }}.xml \
            --cov-report=term \
            --splits 3 \
            --group ${{ matrix.shard }} \
            -v \
            --tb=short

      - name: Rename coverage data file for combining
        if: always()
        run: |
          # Rename .coverage to unique name for later combining
          if [ -f .coverage ]; then
            mv .coverage .coverage.unit-${{ matrix.shard }}
            echo "Renamed .coverage to .coverage.unit-${{ matrix.shard }}"
          else
            echo "Warning: .coverage file not found"
          fi

      - name: Upload unit coverage (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-${{ matrix.shard }}
          path: |
            Firmware/coverage-unit-${{ matrix.shard }}.xml
            Firmware/.coverage.unit-${{ matrix.shard }}
          retention-days: 1
          include-hidden-files: true

  # ==========================================================================
  # Integration Tests - Run in parallel with unit tests
  # ==========================================================================
  backend-integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Firmware

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            Firmware/Tests/requirements-test.txt
            Firmware/webui/backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcap-dev python3-dev libatlas-base-dev libjpeg-dev zlib1g-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Tests/requirements-test.txt
          # Install additional backend dependencies needed for test imports
          pip install python-crontab timezonefinder==6.5.4 croniter

      - name: Run integration tests (parallel, non-hardware)
        env:
          MOTHBOX_ENV: test
        run: |
          # Note: --cov-fail-under is NOT used here because integration tests
          # alone don't achieve 85% coverage (they complement unit tests).
          # Coverage threshold is enforced locally when running the full test suite.
          pytest Tests/integration/ \
            -n 2 \
            --dist loadgroup \
            -m "not hardware" \
            --cov=. \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term \
            -v \
            --tb=short

      - name: Rename coverage data file for combining
        if: always()
        run: |
          # Rename .coverage to unique name for later combining
          if [ -f .coverage ]; then
            mv .coverage .coverage.integration
            echo "Renamed .coverage to .coverage.integration"
          else
            echo "Warning: .coverage file not found"
          fi

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: |
            Firmware/coverage-integration.xml
            Firmware/.coverage.integration
          retention-days: 1
          include-hidden-files: true

  # ==========================================================================
  # Coverage Report - Combine all coverage from unit and integration tests
  # ==========================================================================
  coverage-report:
    name: Coverage Report
    needs: [backend-unit-tests, backend-integration-tests]
    runs-on: ubuntu-latest
    if: always()
    defaults:
      run:
        working-directory: Firmware

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install coverage
        run: pip install coverage[toml]

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-reports/
          merge-multiple: true

      - name: List coverage files
        run: |
          echo "=== Coverage files found in artifacts ==="
          ls -la ../coverage-reports/ || echo "No coverage-reports directory at repo root"
          echo ""
          echo "=== Looking for .coverage data files ==="
          find ../coverage-reports -name ".coverage*" -type f 2>/dev/null || echo "No .coverage files found"
          echo ""
          echo "=== Looking for XML reports ==="
          find ../coverage-reports -name "coverage*.xml" -type f 2>/dev/null || echo "No XML files found"

      - name: Combine coverage data and generate reports
        run: |
          echo "=== Combining coverage data from all test shards ==="

          # Copy .coverage files from artifacts to Firmware directory
          echo "Copying .coverage files..."
          cp ../coverage-reports/.coverage.* . 2>/dev/null || true

          # Also copy XML files for reference
          cp ../coverage-reports/*.xml . 2>/dev/null || true

          # List what we have
          echo ""
          echo "Coverage data files found:"
          ls -la .coverage* 2>/dev/null || echo "No .coverage files in current directory"

          # Combine coverage data
          if ls .coverage.* 1> /dev/null 2>&1; then
            echo ""
            echo "=== Running coverage combine ==="
            coverage combine

            echo ""
            echo "=== Combined Coverage Report ==="
            coverage report

            echo ""
            echo "=== Generating HTML report ==="
            coverage html

            echo ""
            echo "=== Generating combined XML report ==="
            coverage xml -o coverage-combined.xml

            echo ""
            echo "✅ Coverage data combined successfully"
          else
            echo ""
            echo "❌ ERROR: No .coverage data files found to combine"
            echo "This could mean:"
            echo "   - Tests failed and didn't generate coverage"
            echo "   - Artifact upload/download paths have changed"
            echo ""
            echo "Check the individual test job results for details."
            exit 1
          fi

      - name: Enforce 85% coverage threshold
        run: |
          echo "=== Enforcing 85% Coverage Threshold ==="
          coverage report --fail-under=85

      - name: Upload combined coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-combined
          path: |
            Firmware/coverage-combined.xml
            Firmware/htmlcov/
          retention-days: 7

  # ==========================================================================
  # Frontend Tests - Run in parallel with backend tests (4 shards)
  # ==========================================================================
  frontend-tests:
    name: Frontend Tests (Shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: Firmware/webui/frontend

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Firmware/webui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (shard ${{ matrix.shard }}/4)
        timeout-minutes: 5
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
          CI: 'true'
        run: |
          # Run tests with timeout - vitest can hang after test completion
          set +e
          timeout 240 npm run test:run -- --shard=${{ matrix.shard }}/4 --reporter=verbose 2>&1 | tee test-output.txt
          exit_code=${PIPESTATUS[0]}
          set -e

          # If timeout killed process (124), check if tests actually passed
          if [ $exit_code -eq 124 ]; then
            echo "::warning::Process timed out - checking if tests passed before timeout"
            # Check for test failures in the output (FAIL marker from vitest)
            if grep -qE "^\s*FAIL\s+" test-output.txt; then
              echo "::error::Test failures detected before timeout"
              grep -E "^\s*FAIL\s+" test-output.txt || true
              exit 1
            else
              echo "No test failures detected - process likely hung after tests passed"
              echo "::warning::Vitest hung after test completion (known issue with sharding)"
              exit 0
            fi
          fi

          exit $exit_code

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results-shard-${{ matrix.shard }}
          path: Firmware/webui/frontend/test-results/
          if-no-files-found: ignore

  # ==========================================================================
  # Frontend Coverage - Full test suite with coverage threshold enforcement
  # ==========================================================================
  frontend-coverage:
    name: Frontend Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: Firmware/webui/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Firmware/webui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run coverage
        run: npx vitest run --coverage --reporter=verbose

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: Firmware/webui/frontend/coverage/
          retention-days: 14

  # ==========================================================================
  # Security Scan - Run in parallel with tests
  # ==========================================================================
  security-scan:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Firmware

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: Run Bandit security scan (generate report)
        continue-on-error: true
        run: |
          bandit -c pyproject.toml -r . \
            --format json \
            --output bandit-report.json

      - name: Run Bandit security scan (enforce policy)
        run: |
          bandit -c pyproject.toml -r . \
            --severity-level medium \
            --format screen

      - name: Upload Bandit security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: Firmware/bandit-report.json
          retention-days: 7

  # ==========================================================================
  # Python Linting - Ruff check and format
  # ==========================================================================
  python-linting:
    name: Python Linting (Ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Firmware

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linting
        run: ruff check .

      - name: Check Ruff formatting
        run: ruff format --check .

  # ==========================================================================
  # Frontend Typecheck - TypeScript type checking
  # ==========================================================================
  frontend-typecheck:
    name: Frontend Typecheck (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Firmware/webui/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Firmware/webui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

  # ==========================================================================
  # Frontend Linting - ESLint check
  # ==========================================================================
  frontend-linting:
    name: Frontend Linting (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Firmware/webui/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Firmware/webui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ==========================================================================
  # Frontend Security - npm audit for dependency vulnerabilities
  # ==========================================================================
  frontend-security:
    name: Frontend Security (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Firmware/webui/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Firmware/webui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high/critical only)
        run: npm audit --audit-level=high

  # ==========================================================================
  # Test Summary - Aggregate all results
  # ==========================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, coverage-report, frontend-tests, frontend-typecheck, frontend-coverage, security-scan, python-linting, frontend-linting, frontend-security]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "===== Test Results Summary ====="
          echo ""
          echo "Backend Unit Tests: ${{ needs.backend-unit-tests.result }}"
          echo "Backend Integration Tests: ${{ needs.backend-integration-tests.result }}"
          echo "Coverage Report: ${{ needs.coverage-report.result }}"
          echo "Frontend Tests: ${{ needs.frontend-tests.result }}"
          echo "Frontend Typecheck: ${{ needs.frontend-typecheck.result }}"
          echo "Frontend Coverage: ${{ needs.frontend-coverage.result }}"
          echo "Security Scan (Bandit): ${{ needs.security-scan.result }}"
          echo "Python Linting (Ruff): ${{ needs.python-linting.result }}"
          echo "Frontend Linting (ESLint): ${{ needs.frontend-linting.result }}"
          echo "Frontend Security (npm audit): ${{ needs.frontend-security.result }}"
          echo ""

          # Check for failures
          FAILED=0

          if [ "${{ needs.backend-unit-tests.result }}" != "success" ]; then
            echo "❌ Backend unit tests failed"
            FAILED=1
          fi

          if [ "${{ needs.backend-integration-tests.result }}" != "success" ]; then
            echo "❌ Backend integration tests failed"
            FAILED=1
          fi

          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "❌ Frontend tests failed"
            FAILED=1
          fi

          if [ "${{ needs.frontend-typecheck.result }}" != "success" ]; then
            echo "❌ Frontend typecheck failed"
            FAILED=1
          fi

          if [ "${{ needs.frontend-coverage.result }}" != "success" ]; then
            echo "❌ Frontend coverage failed"
            FAILED=1
          fi

          if [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "❌ Security scan (Bandit) failed"
            FAILED=1
          fi

          if [ "${{ needs.python-linting.result }}" != "success" ]; then
            echo "❌ Python linting (Ruff) failed"
            FAILED=1
          fi

          if [ "${{ needs.frontend-linting.result }}" != "success" ]; then
            echo "❌ Frontend linting (ESLint) failed"
            FAILED=1
          fi

          if [ "${{ needs.frontend-security.result }}" != "success" ]; then
            echo "❌ Frontend security (npm audit) failed"
            FAILED=1
          fi

          # Coverage report enforces the 85% threshold - failure means coverage is too low
          if [ "${{ needs.coverage-report.result }}" != "success" ]; then
            echo "❌ Coverage report failed (coverage below 85% threshold or data combining failed)"
            FAILED=1
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "❌ Some checks failed - see above for details"
            exit 1
          fi

          echo ""
          echo "✅ All tests, linting, and security scans passed successfully!"
